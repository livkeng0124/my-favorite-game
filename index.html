<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>草莓 1A2B</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="background-orb orb-left"></div>
      <div class="background-orb orb-right"></div>

      <main class="game-card">
        <section class="hero">
          <p class="eyebrow">Pink 1A2B</p>
          <h1>草莓 1A2B</h1>
          <p class="hero-copy">
            猜出四位不重複數字。數字對、位置也對就是 A；數字對但位置不對就是 B。
          </p>
        </section>

        <nav class="page-links" aria-label="遊戲切換">
          <a class="page-link" href="../index.html">去玩數獨</a>
          <a class="page-link active" href="./index.html" aria-current="page">玩 1A2B</a>
        </nav>

        <section class="status-strip">
          <div class="status-pill">
            <span>已猜次數</span>
            <strong id="attempt-count">0</strong>
          </div>
          <div class="status-pill">
            <span>時間</span>
            <strong id="timer">00:00</strong>
          </div>
          <div class="status-pill">
            <span>最佳結果</span>
            <strong id="best-score">未記錄</strong>
          </div>
        </section>

        <section class="toolbar">
          <button class="soft-button" id="new-game">新遊戲</button>
          <button class="soft-button" id="show-answer">看答案</button>
          <button class="soft-button" id="clear-input">清空輸入</button>
        </section>

        <section class="play-area">
          <section class="guess-panel">
            <div class="panel-card">
              <h2>輸入猜測</h2>
              <p class="panel-copy">
                請輸入 4 位不重複數字，第一位不能是 0。
              </p>

              <form class="guess-form" id="guess-form">
                <label class="sr-only" for="guess-input">輸入 1A2B 猜測</label>
                <input
                  id="guess-input"
                  class="guess-input"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  maxlength="4"
                  placeholder="例如 1234"
                />
                <button class="submit-button" type="submit">送出猜測</button>
              </form>

              <div class="hint-grid">
                <div class="hint-pill">
                  <span>規則</span>
                  <strong>4 位不重複</strong>
                </div>
                <div class="hint-pill">
                  <span>範例</span>
                  <strong>1A2B</strong>
                </div>
              </div>
            </div>

            <div class="panel-card message-card">
              <h2>遊玩提示</h2>
              <p id="message">
                先試一組四位數吧，我會幫你回報幾個 A、幾個 B。
              </p>
            </div>
          </section>

          <section class="history-panel">
            <div class="panel-card history-card">
              <div class="history-head">
                <h2>猜測紀錄</h2>
                <span id="answer-mask" class="answer-mask">答案保密中</span>
              </div>
              <div class="history-list" id="history-list">
                <div class="empty-state">
                  還沒有猜測紀錄，來試第一組數字吧。
                </div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="celebration-modal" id="celebration-modal" aria-hidden="true">
      <div
        class="celebration-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="celebration-title"
      >
        <button class="modal-close" id="close-celebration" aria-label="關閉完成視窗">
          ×
        </button>

        <div class="celebration-berry" aria-hidden="true">
          <svg viewBox="0 0 220 170" class="berry-svg">
            <ellipse cx="110" cy="122" rx="52" ry="44" fill="#ff6b98" />
            <path d="M110 60C97 54 88 46 84 34C97 34 106 39 111 47C116 39 125 34 138 34C133 46 124 54 110 60Z" fill="#77bf74" />
            <path d="M78 76C87 68 98 64 110 64C122 64 133 68 142 76" stroke="#ff8bb4" stroke-width="10" stroke-linecap="round" />
            <g fill="#fff4b7">
              <circle cx="90" cy="88" r="3" />
              <circle cx="111" cy="83" r="3" />
              <circle cx="131" cy="90" r="3" />
              <circle cx="84" cy="108" r="3" />
              <circle cx="104" cy="104" r="3" />
              <circle cx="125" cy="109" r="3" />
              <circle cx="95" cy="126" r="3" />
              <circle cx="117" cy="122" r="3" />
              <circle cx="135" cy="127" r="3" />
            </g>
          </svg>
        </div>

        <p class="celebration-badge">Guess Master</p>
        <h2 id="celebration-title">大功告成</h2>
        <p class="celebration-copy" id="celebration-copy">
          你猜中了這組草莓密碼。
        </p>
        <button class="soft-button celebration-button" id="celebration-new-game">
          再玩一局
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
