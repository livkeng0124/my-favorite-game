<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的草莓遊戲大廳</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Trebuchet MS", sans-serif;
      background: radial-gradient(circle at top left, #ffe9f2 0%, #ffdfea 100%);
      color: #6f3553;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
    }
    .play-link {
      padding: 16px 32px;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff90bb 0%, #ef6ea4 100%);
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(218, 92, 145, 0.28);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .play-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(218, 92, 145, 0.4);
    }
  </style>
</head>
<body>

  <h1>🍓 歡迎來到我的小遊戲集</h1>
  
  <!-- 這裡的 ./1a2b/ 就是對應到你剛剛上傳的 1a2b 資料夾 -->
  <a href="./1a2b/" class="play-link">點我進入：草莓 1A2B 遊戲</a>

</body>
</html>
