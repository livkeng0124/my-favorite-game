<svg width="1200" height="1500" viewBox="0 0 1200 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="60" x2="1110" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8FB" />
      <stop offset="0.5" stop-color="#FFEAF3" />
      <stop offset="1" stop-color="#FFDDEA" />
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 150) rotate(90) scale(260)">
      <stop stop-color="#FFCFE2" stop-opacity="0.9" />
      <stop offset="1" stop-color="#FFCFE2" stop-opacity="0" />
