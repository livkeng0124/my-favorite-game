    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 1220) rotate(90) scale(320)">
      <stop stop-color="#FFBCD4" stop-opacity="0.8" />
